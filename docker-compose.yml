services:
  samia-api:
    image: ghcr.io/cayo-sa/sam-ia-financial-assistant:main
    environment:
      - TZ=America/Sao_Paulo
      - PYTHONUNBUFFERED=1
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - USER_ID=${USER_ID}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - BATCH_API_TOKEN=${BATCH_API_TOKEN}
    networks:
      - network_public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.samia-api.rule=Host(`sam-ia.mardeideias.com.br`)"
      - "traefik.http.services.samia-api.loadbalancer.server.port=8000"
      - "traefik.http.routers.samia-api.entrypoints=web,websecure"
      - "traefik.http.routers.samia-api.tls=true"
      - "traefik.docker.network=network_public"
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.samia-api.rule=Host(`sam-ia.mardeideias.com.br`)"
        - "traefik.http.services.samia-api.loadbalancer.server.port=8000"
        - "traefik.http.routers.samia-api.entrypoints=web,websecure"
        - "traefik.http.routers.samia-api.tls=true"
        - "traefik.docker.network=network_public"

networks:
  network_public:
    external: true
    name: network_public
